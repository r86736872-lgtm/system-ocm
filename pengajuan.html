<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Pinjaman Dana Tunai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            overflow-x: hidden;
        }
        
        /* Background Animations */
        .bg-shape {
            position: absolute;
            filter: blur(60px);
            opacity: 0.5;
            z-index: -1;
            animation: blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .delay-2000 { animation-delay: 2s; }
        .delay-4000 { animation-delay: 4s; }

        .glass-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-radio:checked + div {
            border-color: #3b82f6;
            background-color: #eff6ff;
            box-shadow: 0 4px 15px -3px rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }
        .custom-radio:checked + div svg {
            display: block;
        }
        
        /* Modern Input Focus */
        .modern-input:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* Custom Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-8 relative">

    <!-- Animated Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="bg-shape bg-blue-600 w-96 h-96 rounded-full top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="bg-shape bg-indigo-600 w-96 h-96 rounded-full bottom-0 right-0 translate-x-1/3 translate-y-1/3 delay-2000"></div>
        <div class="bg-shape bg-teal-500 w-80 h-80 rounded-full top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 delay-4000 opacity-30"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 right-5 z-50 transform translate-x-full opacity-0 transition-all duration-300 max-w-sm w-full bg-white shadow-2xl rounded-2xl border border-slate-100 p-4 flex items-center gap-3">
        <div id="toast-icon-box" class="w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0"></div>
        <div class="flex-1">
            <h4 id="toast-title" class="text-sm font-bold text-slate-900"></h4>
            <p id="toast-desc" class="text-xs text-slate-500 mt-0.5"></p>
        </div>
    </div>

    <div class="glass-container w-full max-w-2xl rounded-[2rem] overflow-hidden flex flex-col relative min-h-[650px] z-10 fade-in">
        
        <!-- Header -->
        <div class="bg-slate-900 text-white p-6 md:p-8 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-blue-500 rounded-full blur-3xl opacity-40"></div>
            
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <h2 class="text-2xl font-bold tracking-tight">E-Form Dana Tunai</h2>
                    <p class="text-xs text-blue-200 font-medium mt-0.5">Pengajuan Cepat & Aman</p>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="relative flex justify-between items-center w-full mt-2">
                <div class="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-slate-700/50 w-full z-0 rounded-full"></div>
                <div id="progress-line" class="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-blue-500 w-0 transition-all duration-500 z-0 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                
                <div class="relative z-10 flex flex-col items-center gap-2">
                    <div id="step-circle-1" class="w-8 h-8 rounded-full bg-blue-600 ring-4 ring-slate-900 flex items-center justify-center text-xs font-bold transition-all duration-300 shadow-lg shadow-blue-500/40">1</div>
                    <span class="text-[10px] font-bold uppercase tracking-wider text-blue-400">Identitas</span>
                </div>
                <div class="relative z-10 flex flex-col items-center gap-2">
                    <div id="step-circle-2" class="w-8 h-8 rounded-full bg-slate-800 ring-4 ring-slate-900 flex items-center justify-center text-xs font-bold text-slate-400 transition-all duration-300">2</div>
                    <span id="step-text-2" class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Jaminan</span>
                </div>
            </div>
        </div>

        <form id="loan-wizard" class="p-6 md:p-8 flex-1 flex flex-col justify-between">
            
            <!-- STEP 1 -->
            <div id="step-1" class="space-y-5 fade-in">
                <div class="mb-2">
                    <h3 class="text-lg font-bold text-slate-900">Data Diri Pemohon</h3>
                    <p class="text-xs text-slate-500">Isi sesuai dengan Kartu Tanda Penduduk (KTP).</p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5 tracking-wider">Nama Lengkap</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </span>
                        <input type="text" id="nama" required class="modern-input w-full bg-slate-50/50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-11 pr-4 py-3 text-sm outline-none transition-all" placeholder="Masukan Nama Sesuai KTP">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5 tracking-wider">Tempat Lahir</label>
                        <input type="text" id="tempat_lahir" required class="modern-input w-full bg-slate-50/50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl px-4 py-3 text-sm outline-none transition-all" placeholder="Kota Kelahiran">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5 tracking-wider">Tanggal Lahir</label>
                        <input type="date" id="tgl_lahir" required class="modern-input w-full bg-slate-50/50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl px-4 py-3 text-sm outline-none transition-all text-slate-600">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5 tracking-wider">Nomor WA Aktif</label>
                    <div class="relative flex items-center">
                        <div class="absolute left-1 top-1 bottom-1 bg-slate-100 border-r border-slate-200 rounded-l-lg px-3 flex items-center justify-center">
                            <span class="text-sm font-bold text-slate-600">+62</span>
                        </div>
                        <input type="tel" id="no_hp" required class="modern-input w-full bg-slate-50/50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-16 pr-4 py-3 text-sm outline-none transition-all" placeholder="81234567890">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5 tracking-wider">Alamat Domisili</label>
                    <textarea id="alamat" required rows="2" class="modern-input w-full bg-slate-50/50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl px-4 py-3 text-sm outline-none transition-all resize-none" placeholder="Tuliskan alamat domisili lengkap..."></textarea>
                </div>
            </div>

            <!-- STEP 2 -->
            <div id="step-2" class="hidden space-y-6">
                <div class="mb-2">
                    <h3 class="text-lg font-bold text-slate-900">Jaminan & Dana</h3>
                    <p class="text-xs text-slate-500">Tentukan nominal, BPKB, dan ID CS Anda (opsional).</p>
                </div>

                <!-- NEW FEATURE: CS ID -->
                <div class="bg-indigo-50/50 border border-indigo-100 p-4 rounded-2xl">
                    <label class="flex items-center gap-2 text-xs font-bold text-indigo-900 uppercase mb-2 tracking-wider">
                        <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path></svg>
                        CS ID
                    </label>
                    <input type="text" id="cs_id" class="modern-input w-full bg-white border border-indigo-200 focus:border-indigo-500 rounded-xl px-4 py-2.5 text-sm outline-none transition-all uppercase placeholder:normal-case font-bold text-indigo-700" placeholder="Masukan ID/Nama Karyawan (Kosongkan jika mandiri)">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5 tracking-wider">Plafon Pinjaman</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-lg font-bold text-slate-400">Rp</span>
                        <input type="number" id="nominal" required class="modern-input w-full bg-slate-50/50 border border-slate-200 focus:border-blue-500 focus:bg-white rounded-xl pl-12 pr-4 py-4 font-mono font-bold text-xl text-blue-600 outline-none transition-all shadow-sm" placeholder="0">
                    </div>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="flex items-center justify-center w-5 h-5 rounded-full bg-emerald-100 text-emerald-600"><svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></span>
                        <p id="currency-preview" class="text-xs font-bold text-emerald-600 tracking-wide">0</p>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-2 tracking-wider">Status Kepemilikan BPKB</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        
                        <label class="relative block cursor-pointer select-none group">
                            <input type="radio" name="status_bpkb" value="Atas Nama Sendiri" required class="custom-radio sr-only">
                            <div class="p-4 bg-white border border-slate-200 rounded-2xl transition-all duration-200 flex items-center gap-3 group-hover:border-blue-300">
                                <div class="w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center bg-white shrink-0 transition-colors">
                                    <svg class="w-2.5 h-2.5 text-blue-600 hidden" fill="currentColor" viewBox="0 0 20 20"><circle cx="10" cy="10" r="6"/></svg>
                                </div>
                                <div>
                                    <span class="block text-sm font-bold text-slate-900">A1</span>
                                    <span class="block text-[11px] text-slate-400 mt-0.5">Sesuai KTP Pemohon</span>
                                </div>
                            </div>
                        </label>

                        <label class="relative block cursor-pointer select-none group">
                            <input type="radio" name="status_bpkb" value="Bukan Atas Nama Sendiri" class="custom-radio sr-only">
                            <div class="p-4 bg-white border border-slate-200 rounded-2xl transition-all duration-200 flex items-center gap-3 group-hover:border-blue-300">
                                <div class="w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center bg-white shrink-0 transition-colors">
                                    <svg class="w-2.5 h-2.5 text-blue-600 hidden" fill="currentColor" viewBox="0 0 20 20"><circle cx="10" cy="10" r="6"/></svg>
                                </div>
                                <div>
                                    <span class="block text-sm font-bold text-slate-900">A2</span>
                                    <span class="block text-[11px] text-slate-400 mt-0.5">Kerabat / Belum Balik Nama</span>
                                </div>
                            </div>
                        </label>

                    </div>
                </div>
            </div>

            <!-- Footer Navigation -->
            <div class="flex gap-3 items-center justify-between border-t border-slate-100 pt-6 mt-8">
                <button type="button" id="btn-back" class="hidden px-5 py-3.5 border border-slate-200 text-slate-600 font-bold text-xs uppercase tracking-wider rounded-xl hover:bg-slate-50 active:scale-95 transition-all cursor-pointer">
                    Kembali
                </button>
                
                <button type="button" id="btn-next" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 active:scale-[0.98] text-white text-xs font-bold uppercase tracking-wider py-3.5 rounded-xl shadow-[0_8px_20px_-6px_rgba(59,130,246,0.5)] transition-all ml-auto flex items-center justify-center gap-2 cursor-pointer">
                    <span>Lanjutkan</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                </button>

                <div id="loading-state" class="hidden w-full items-center justify-center gap-3 bg-blue-600 text-white py-3.5 rounded-xl shadow-lg font-bold text-xs">
                    <div class="loader"></div>
                    <span>Mengirim Data...</span>
                </div>
            </div>

        </form>
         <footer class="mt-auto py-6 text-center text-xs font-semibold text-slate-400 bg-white border-t border-slate-200">
        &copy; RIDHO POS KALIDONI.
    </footer>
    </div>

    <script>
        // ==========================================
        // 1. KONFIGURASI FIREBASE REALTIME DATABASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA9-fz5YwCvVhTzV4mT65uQ727MWTOm32U",
            authDomain: "system-ocm.firebaseapp.com",
            databaseURL: "https://system-ocm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "system-ocm",
            storageBucket: "system-ocm.firebasestorage.app",
            messagingSenderId: "433934854222",
            appId: "1:433934854222:web:39e21493d1a20d5c993b1f"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // ==========================================
        // 2. STATE MANAGER & NAVIGASI WIZARD
        // ==========================================
        let currentStep = 1;

        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const btnNext = document.getElementById('btn-next');
        const btnBack = document.getElementById('btn-back');
        const loadState = document.getElementById('loading-state');
        const progressLine = document.getElementById('progress-line');
        const stepCircle2 = document.getElementById('step-circle-2');
        const stepText2 = document.getElementById('step-text-2');
        const nominalInput = document.getElementById('nominal');
        const currencyPreview = document.getElementById('currency-preview');

        // Fitur Live Format Mata Uang Rupiah (Interaktif)
        nominalInput.addEventListener('input', (e) => {
            let val = parseInt(e.target.value) || 0;
            if(val === 0) {
                currencyPreview.innerText = "0";
            } else {
                currencyPreview.innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);
            }
        });

        // Transisi Form
        function toggleStep(hideStep, showStep) {
            hideStep.classList.remove('fade-in');
            hideStep.classList.add('hidden');
            showStep.classList.remove('hidden');
            // Sedikit delay agar display:block teraplikasi sebelum animasi fade-in
            requestAnimationFrame(() => {
                showStep.classList.add('fade-in');
            });
        }

        btnNext.addEventListener('click', () => {
            if (currentStep === 1) {
                if (!document.getElementById('nama').value.trim() ||
                    !document.getElementById('tempat_lahir').value.trim() ||
                    !document.getElementById('tgl_lahir').value ||
                    !document.getElementById('no_hp').value.trim() ||
                    !document.getElementById('alamat').value.trim()) {
                    return popToast('Data Belum Lengkap!', 'Harap isi semua informasi identitas diri.', 'error');
                }

                toggleStep(step1, step2);
                btnBack.classList.remove('hidden');
                
                progressLine.style.width = '100%';
                stepCircle2.classList.remove('bg-slate-800', 'text-slate-400', 'ring-slate-900');
                stepCircle2.classList.add('bg-blue-600', 'text-white', 'ring-slate-900', 'shadow-lg', 'shadow-blue-500/40');
                stepText2.classList.remove('text-slate-500');
                stepText2.classList.add('text-blue-400');

                btnNext.querySelector('span').innerText = 'Kirim Pengajuan';
                btnNext.querySelector('svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />';
                currentStep = 2;
                
            } else if (currentStep === 2) {
                submitFormRealtime();
            }
        });

        btnBack.addEventListener('click', () => {
            if (currentStep === 2) {
                toggleStep(step2, step1);
                btnBack.classList.add('hidden');

                progressLine.style.width = '0%';
                stepCircle2.classList.add('bg-slate-800', 'text-slate-400', 'ring-slate-900');
                stepCircle2.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/40');
                stepText2.classList.add('text-slate-500');
                stepText2.classList.remove('text-blue-400');

                btnNext.querySelector('span').innerText = 'Lanjutkan';
                btnNext.querySelector('svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />';
                currentStep = 1;
            }
        });

        // ==========================================
        // 3. INTEGRASI LANGSUNG KE FIREBASE NODE ADMIN
        // ==========================================
        function submitFormRealtime() {
            let namaVal = document.getElementById('nama').value.trim();
            let tempatLahirVal = document.getElementById('tempat_lahir').value.trim();
            let tglLahirVal = document.getElementById('tgl_lahir').value;
            let noHpVal = document.getElementById('no_hp').value.trim();
            let alamatVal = document.getElementById('alamat').value.trim();
            let nominalVal = parseInt(document.getElementById('nominal').value) || 0;
            
            // FITUR BARU: Ambil data CS ID
            let csIdVal = document.getElementById('cs_id').value.trim().toUpperCase();
            
            let bpkbRadio = document.querySelector('input[name="status_bpkb"]:checked');
            let statusBpkbVal = bpkbRadio ? bpkbRadio.value : "-";

            if (!nominalVal || !bpkbRadio) {
                return popToast('Data Belum Lengkap!', 'Nominal pinjaman dan kepemilikan BPKB wajib diisi.', 'error');
            }

            btnNext.classList.add('hidden');
            btnBack.classList.add('hidden');
            loadState.classList.remove('hidden');
            loadState.classList.add('flex');

            let dataPengajuan = {
                nama: namaVal,
                no_hp: noHpVal,
                tempat_lahir: tempatLahirVal,
                tgl_lahir: tglLahirVal,
                alamat: alamatVal,
                nominal_pengajuan: nominalVal,
                status_bpkb: statusBpkbVal,
                cs_id: csIdVal || "Tanpa CS", // Jika kosong, set default 'Tanpa CS'
                tanggal_masuk: new Date().toLocaleString('id-ID'),
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                kontrakAdmin: "" 
            };

            let isResolved = false;

            firebase.database().ref('pengajuan_pinjaman').push(dataPengajuan)
                .then(() => {
                    isResolved = true;
                    restoreSubmitBtn();
                    popToast('Berhasil!', 'Data pengajuan dana Anda berhasil masuk ke sistem.', 'success');
                    
                    document.getElementById('loan-wizard').reset();
                    document.getElementById('currency-preview').innerText = "0";
                    document.getElementById('btn-back').click(); // Auto-back ke Langkah 1
                })
                .catch((error) => {
                    isResolved = true;
                    restoreSubmitBtn();
                    popToast('Gagal Terkirim', 'Terjadi error: ' + error.message, 'error');
                });

            setTimeout(() => {
                if (!isResolved) {
                    isResolved = true;
                    restoreSubmitBtn();
                    popToast('Koneksi Lemah', 'Waktu habis. Coba pastikan koneksi internet Anda stabil.', 'error');
                }
            }, 10000);
        }

        function restoreSubmitBtn() {
            loadState.classList.add('hidden');
            loadState.classList.remove('flex');
            btnNext.classList.remove('hidden');
            btnBack.classList.remove('hidden');
        }

        // ==========================================
        // 4. ANIMASI INTERAKTIF POPUP TOAST
        // ==========================================
        function popToast(title, desc, type = 'info') {
            const toast = document.getElementById('toast');
            const iconBox = document.getElementById('toast-icon-box');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;

            if (type === 'success') {
                iconBox.className = "w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0 bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-lg";
                iconBox.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>';
            } else if (type === 'error') {
                iconBox.className = "w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0 bg-gradient-to-br from-rose-400 to-rose-600 shadow-lg";
                iconBox.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>';
            }

            toast.classList.remove('translate-x-full', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
            }, 4000);
        }
    </script>
</body>
</html>
